<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акция - Happy Pet</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fafafa;
            min-height: 100vh;
        }
        
        /* Навигация через iframe */
        .nav-frame {
            width: 100%;
            height: 64px;
            border: none;
            display: block;
        }
        
        /* Контейнер для карточки по центру */
        .promo-page-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 64px);
            padding: 40px 24px;
        }
        
        /* Карточка акции - такая же как на index */
        .promo-card-page {
            background-color: #facc15;
            border-radius: 24px;
            padding: 32px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
        }

        .promo-close-page {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #525252;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            border-radius: 50%;
            text-decoration: none;
        }

        .promo-close-page:hover {
            color: #1a1a1a;
            background-color: rgba(0, 0, 0, 0.05);
        }

        .promo-badge-page {
            display: inline-block;
            background-color: #f43f5e;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .promo-title-page {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .promo-subtitle-page {
            font-size: 14px;
            color: #525252;
            margin-bottom: 16px;
        }

        .promo-list-page {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .promo-list-item-page {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #1a1a1a;
            padding: 6px 0;
        }

        .promo-check-page {
            color: #1a1a1a;
            flex-shrink: 0;
        }

        .promo-btn-page {
            width: 100%;
            padding: 14px 28px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 12px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .promo-btn-page:hover {
            background-color: #333333;
        }

        .promo-deadline-page {
            text-align: center;
            font-size: 12px;
            color: #525252;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        /* Адаптивность для мобильных */
        @media (max-width: 480px) {
            .promo-card-page {
                padding: 24px;
            }
            
            .promo-title-page {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Навигация через iframe -->
    <iframe src="navigation.html" class="nav-frame"></iframe>
    
    <!-- Контейнер с карточкой акции по центру -->
    <div class="promo-page-container">
        <div class="promo-card-page">
            <a href="index.html" class="promo-close-page">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </a>
            <span class="promo-badge-page">Акция</span>
            <h1 class="promo-title-page">Найди друга — получи подарок!</h1>
            <p class="promo-subtitle-page">Забери питомца из приюта и получи:</p>
            <ul class="promo-list-page">
                <li class="promo-list-item-page">
                    <svg class="promo-check-page" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Стартовый набор для питомца
                </li>
                <li class="promo-list-item-page">
                    <svg class="promo-check-page" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Скидка 20% на первый заказ
                </li>
                <li class="promo-list-item-page">
                    <svg class="promo-check-page" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Бесплатная консультация ветеринара
                </li>
            </ul>
            <a href="catalog.html" class="promo-btn-page">Подробнее</a>
            <p class="promo-deadline-page">только до 1 июня!</p>
        </div>
    </div>
</body>
</html>
